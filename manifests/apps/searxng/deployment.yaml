apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: apps
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: ice-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
    spec:
      initContainers:
      - name: copy-settings
        image: busybox
        command: ['sh', '-c', 'cp /config/settings.yml /etc/searxng/settings.yml && chmod 666 /etc/searxng/settings.yml']
        volumeMounts:
        - name: settings
          mountPath: /config
        - name: data
          mountPath: /etc/searxng
      containers:
      - name: searxng
        image: searxng/searxng:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SEARXNG_BASE_URL
          value: "http://localhost:8888"
        - name: SEARXNG_PORT
          value: "8080"
        volumeMounts:
        - name: data
          mountPath: /etc/searxng
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
      enableServiceLinks: false
      volumes:
      - name: settings
        configMap:
          name: searxng-settings
      - name: data
        emptyDir: {}
