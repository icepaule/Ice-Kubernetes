apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: apps
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: ice-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
    spec:
      containers:
      - name: searxng
        image: searxng/searxng:latest
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: data
          mountPath: /etc/searxng
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: searxng-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-data
  namespace: apps
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: apps
  labels:
    app.kubernetes.io/name: searxng
spec:
  type: LoadBalancer
  ports:
  - port: 8888
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: searxng
