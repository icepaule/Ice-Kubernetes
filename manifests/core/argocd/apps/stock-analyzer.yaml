apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stock-analyzer
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ice-kubernetes
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/<GITHUB_USER>/Ice-Kubernetes.git
    targetRevision: main
    path: manifests/apps/stock-analyzer
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
